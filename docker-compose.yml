version: "3.8"

services:
  AI-Sales-Assistants:
    build: .
    container_name: AI-Sales-Assistants
    env_file:
      - .env
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    depends_on:
      - qdrant
      - neo4j

  neo4j:
    image: neo4j:latest
    container_name: neo4j
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
  neo4j_data:
